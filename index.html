<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas du monde — Maison Nagara (Acte I · joueurs)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04060c; --night:#0a1226; --steel:#3a4d7a;
  --cyan:#5fd4ff; --cyan-dim:#3a8fb5;
  --silver:#eef3f9; --silver-dim:#9fb0c8;
  --bronze:#c9a05a; --bronze-bright:#f0cf86;
  --nagara:#6fb4ff; --ally:#57c98a; --enemy:#d8604f; --annex:#c9a05a; --hidden:#a26cd8;
  --line:rgba(95,212,255,.22); --panel:rgba(8,14,28,.92);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:"EB Garamond",Georgia,serif;color:var(--silver);background:var(--ink)}
#app{display:flex;height:100vh;width:100vw}

/* ===== SIDEBAR MAISON (gauche) ===== */
#house{flex:0 0 auto;width:330px;height:100vh;background:linear-gradient(180deg,#0a1226,#070d1c);border-right:1px solid var(--line);overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1);z-index:9;display:flex;flex-direction:column}
#house.collapsed{width:0;border-right:none}
.hInner{width:330px;height:100vh;overflow-y:auto;padding:0 0 40px}
.hInner::-webkit-scrollbar{width:7px}.hInner::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:4px}
.hCrest{padding:18px 18px 14px;text-align:center;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(180deg,#0a1226,rgba(10,18,38,.92));z-index:2;backdrop-filter:blur(3px)}
.crestRow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:9px}
.crestRow .banner{height:84px;width:auto;filter:drop-shadow(0 3px 8px rgba(0,0,0,.6))}
.crestRow .banner.flip{transform:scaleX(-1)}
.crestRow .wolfWrap{width:78px;height:78px;border-radius:50%;border:1.5px solid var(--bronze);display:grid;place-items:center;background:radial-gradient(circle,rgba(201,160,90,.16),rgba(8,14,28,.4) 70%);box-shadow:0 0 18px -4px rgba(201,160,90,.4)}
.crestRow .wolfWrap img{width:58px;height:58px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
.hCrest .hname{font-family:"Cinzel",serif;font-weight:600;font-size:19px;letter-spacing:.04em;color:var(--silver)}
.hCrest .hmotto{font-size:12.5px;color:var(--silver-dim);font-style:italic;margin-top:3px}
.hSec{border-bottom:1px solid rgba(95,212,255,.1)}
.hSec>.hHd{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 18px;cursor:pointer;user-select:none;transition:.15s}
.hSec>.hHd:hover{background:rgba(95,212,255,.05)}
.hSec>.hHd .ht{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan)}
.hSec>.hHd .hcar{color:var(--silver-dim);font-size:11px;transition:.2s}
.hSec.open>.hHd .hcar{transform:rotate(90deg);color:var(--cyan)}
.hBd{max-height:0;overflow:hidden;transition:max-height .3s ease}
.hSec.open .hBd{max-height:1400px}
.hBdIn{padding:4px 18px 18px}

/* statut */
.statusRow{display:flex;gap:6px;margin-bottom:10px}
.statusBtn{flex:1;font-family:"Cinzel",serif;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;border-radius:6px;padding:8px 4px;cursor:pointer;border:1px solid var(--line);background:rgba(8,14,28,.6);color:var(--silver-dim);transition:.15s;text-align:center;line-height:1.3}
.statusBtn:hover{border-color:var(--steel);color:var(--silver)}
.statusBtn.on{border-color:var(--bronze);background:rgba(201,160,90,.16);color:var(--bronze-bright)}
.statusBtn b{display:block;font-size:13px}
.quota{font-size:13px;color:var(--silver-dim);text-align:center}
.quota b{color:var(--bronze-bright);font-size:16px}

/* réserve de Mélange */
.melHead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
.melHead .melN{font-family:"Cinzel",serif;font-size:26px;color:var(--bronze-bright);line-height:1}
.melHead .melL{font-size:11px;color:var(--silver-dim);letter-spacing:.06em;text-transform:uppercase}
.melTokens{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.melTok{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bronze);background:radial-gradient(circle at 38% 32%,rgba(240,207,134,.55),rgba(201,160,90,.12));cursor:pointer;transition:.15s;position:relative}
.melTok:hover{transform:scale(1.12)}
.melTok.ghost{border-style:dashed;border-color:var(--steel);background:rgba(8,14,28,.4)}
.melTok.ghost:hover{border-color:var(--bronze)}
.melBtns{display:flex;gap:6px;margin-bottom:8px}
.melBtns button{flex:1;font-size:11px;border-radius:6px;padding:7px 4px;cursor:pointer;border:1px solid var(--line);background:rgba(8,14,28,.6);color:var(--silver-dim);transition:.15s;font-family:"EB Garamond",serif}
.melBtns button:hover{border-color:var(--cyan-dim);color:var(--cyan)}
.melBtns button.spend:hover{border-color:var(--enemy);color:var(--enemy)}
.melNote{font-size:11.5px;color:var(--silver-dim);font-style:italic;line-height:1.4;margin-bottom:10px}
.menaceRow{display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(216,96,79,.3);border-radius:7px;padding:7px 11px;background:rgba(216,96,79,.06)}
.menaceRow .ml{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--enemy)}
.menaceRow .mv{font-family:"Cinzel",serif;font-size:20px;color:var(--enemy)}
.menaceRow .mctl button{width:22px;height:22px;border-radius:5px;border:1px solid rgba(216,96,79,.4);background:rgba(8,14,28,.6);color:var(--enemy);cursor:pointer;font-size:13px;line-height:1;margin-left:4px}

/* domaines */
.domRow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.domRow .dn{flex:0 0 92px;font-size:13px;color:var(--silver)}
.domRow .dn span{display:block;font-size:10.5px;color:var(--silver-dim);font-style:italic}
.domPips{display:flex;gap:5px}
.domPip{width:17px;height:17px;border-radius:4px;border:1px solid var(--cyan-dim);background:rgba(8,14,28,.6);cursor:pointer;transition:.15s}
.domPip:hover{border-color:var(--cyan)}
.domPip.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 7px -2px var(--cyan)}

.chip.trait.fondateur .fedit{margin-left:7px;font-size:11px;opacity:.5;cursor:pointer}.chip.trait.fondateur .fedit:hover{opacity:1}.chip.trait.fondateur.vide{border-style:dashed;opacity:.72}
  /* traits & atouts */
.chip{border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:7px;background:rgba(10,18,38,.5);transition:.15s}
.chip .cn{font-family:"Cinzel",serif;font-size:13px;color:var(--silver);letter-spacing:.02em}
.chip .cd{font-size:12.5px;color:var(--silver-dim);font-style:italic;margin-top:3px;line-height:1.4}
.chip.trait{cursor:pointer}
.chip.trait:hover{border-color:var(--bronze)}
.chip.trait.locked{opacity:.45}
.chip.trait .ct{font-size:10px;color:var(--bronze-bright);letter-spacing:.06em;text-transform:uppercase;float:right}
.spec{border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:7px;background:rgba(10,18,38,.5);cursor:pointer;transition:.15s}
.spec:hover{border-color:var(--cyan-dim)}
.spec.sel{border-color:var(--bronze);background:rgba(201,160,90,.1);box-shadow:0 0 0 1px rgba(201,160,90,.3) inset}
.spec .arow{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.spec .an{font-family:"Cinzel",serif;font-size:13px;color:var(--silver)}
.spec.sel .an{color:var(--bronze-bright)}
.spec .seq{font-size:10px;color:var(--bronze-bright);letter-spacing:.04em;text-transform:uppercase;text-align:right;flex:0 0 auto;white-space:nowrap}
.spec .ad{font-size:12px;color:var(--silver-dim);font-style:italic;margin-top:4px;line-height:1.4}
.selBanner{font-size:11.5px;color:var(--bronze-bright);font-style:italic;border-top:1px dashed rgba(201,160,90,.3);padding-top:7px;margin-top:2px}

/* maisonnée */
.agent{border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:7px;background:rgba(10,18,38,.5)}
.agent .arole{font-size:10px;color:var(--bronze-bright);letter-spacing:.06em;text-transform:uppercase}
.agent .aname{font-family:"Cinzel",serif;font-size:14px;color:var(--silver);margin:1px 0 4px}
.agent .askills{font-size:11.5px;color:var(--silver-dim);line-height:1.45}
.agent .aatout{font-size:11.5px;color:var(--cyan);font-style:italic;margin-top:4px;line-height:1.4}
.agent.pnj .aname{font-size:13px}

/* toggle button for the house panel */
#houseToggle{position:absolute;top:14px;left:14px;z-index:10;font-family:"Cinzel",serif;letter-spacing:.1em;text-transform:uppercase;font-size:10px;border-radius:6px;padding:8px 13px;cursor:pointer;border:1px solid var(--bronze);background:rgba(8,14,28,.85);color:var(--bronze-bright);transition:.2s;display:none}
#houseToggle:hover{color:#fff;border-color:var(--bronze-bright)}
#houseToggle.show{display:block}

/* ===== MAP STAGE ===== */
#stage{position:relative;flex:1;overflow:hidden;
  background:radial-gradient(1200px 700px at 50% 40%, #0c1630, #05070f 80%);}
#mapFrame{position:absolute;top:0;left:0;transform-origin:top left;z-index:1}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:1;user-select:none;-webkit-user-drag:none}
#mapGrid{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.5;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/></svg>")}
#scan{position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(95,212,255,.035) 0 1px,transparent 1px 3px)}

/* empty-state loader prompt */
#dropHint{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:30px}
#dropHint.hide{display:none}
#dropHint .ring{width:120px;height:120px;border-radius:50%;border:1.5px dashed var(--line);display:grid;place-items:center;color:var(--cyan);font-size:38px;animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#dropHint h2{font-family:"Cinzel",serif;font-weight:600;letter-spacing:.04em;color:var(--silver);margin:0;font-size:22px}
#dropHint p{color:var(--silver-dim);font-style:italic;max-width:440px;margin:0;line-height:1.5}
.loadbtn{font-family:"Cinzel",serif;letter-spacing:.14em;text-transform:uppercase;font-size:12px;border-radius:8px;padding:13px 26px;cursor:pointer;border:1px solid var(--cyan-dim);background:linear-gradient(135deg,rgba(95,212,255,.18),rgba(8,14,28,.6));color:var(--cyan);transition:.25s}
.loadbtn:hover{border-color:var(--cyan);color:#fff;box-shadow:0 0 22px -6px var(--cyan)}

/* markers */
.marker{position:absolute;z-index:5;transform:translate(-50%,-50%);cursor:pointer;width:34px;height:34px;display:grid;place-items:center}
.marker .glyph{width:18px;height:18px;border-radius:50%;border:2px solid var(--nagara);background:rgba(8,14,28,.85);transition:.25s;
  box-shadow:0 0 0 4px rgba(8,14,28,.5), 0 0 14px -2px var(--nagara)}
.marker .ping{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid var(--nagara);opacity:.7;animation:ping 2.4s ease-out infinite}
@keyframes ping{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.6);opacity:0}}
.marker .lbl{position:absolute;top:122%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:"Cinzel",serif;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--silver);background:rgba(4,6,12,.82);padding:3px 9px;border-radius:4px;border:1px solid var(--line);opacity:.94;transition:.2s;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.marker:hover .lbl{opacity:1;border-color:var(--cyan-dim)}
.marker:hover .glyph{transform:scale(1.25)}
.marker.sel .glyph{transform:scale(1.3);box-shadow:0 0 0 4px rgba(8,14,28,.5),0 0 20px var(--cyan)}
.marker.sel .lbl{opacity:1;border-color:var(--cyan);color:#fff}
/* state colours */
.marker[data-state="nagara"] .glyph,.marker[data-state="nagara"] .ping{border-color:var(--nagara)}
.marker[data-state="visite"] .glyph{border-color:var(--silver-dim);box-shadow:0 0 0 4px rgba(8,14,28,.5)}
.marker[data-state="visite"] .ping{display:none}
.marker[data-state="allie"] .glyph,.marker[data-state="allie"] .ping{border-color:var(--ally)}
.marker[data-state="ennemi"] .glyph,.marker[data-state="ennemi"] .ping{border-color:var(--enemy)}
.marker[data-state="annexe"] .glyph{border-color:var(--annex);background:var(--annex)}
.marker[data-state="annexe"] .ping{border-color:var(--annex)}
.marker.hiddenLoc{display:none}
.marker.hiddenLoc.revealed{display:grid}

/* top bar */
#topbar{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;
  background:linear-gradient(180deg,rgba(4,6,12,.85),transparent)}
#topbar .title{font-family:"Cinzel",serif;letter-spacing:.18em;text-transform:uppercase;font-size:13px;color:var(--cyan)}
#topbar .title b{color:var(--silver);font-weight:600}
#topbar .tools{display:flex;gap:8px;position:relative}
.tbtn{font-family:"Cinzel",serif;letter-spacing:.1em;text-transform:uppercase;font-size:10px;border-radius:6px;padding:8px 13px;cursor:pointer;border:1px solid var(--line);background:rgba(8,14,28,.7);color:var(--silver-dim);transition:.2s}
.tbtn:hover{color:var(--cyan);border-color:var(--cyan-dim)}


/* ===== SIDE PANEL ===== */
#panel{width:0;flex:0 0 auto;background:var(--panel);border-left:1px solid var(--line);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1);z-index:7;
  box-shadow:-20px 0 50px -20px rgba(0,0,0,.8)}
#panel.open{width:436px}
@media(max-width:900px){#panel.open{width:88vw}}
.pInner{width:436px;max-width:88vw;height:100vh;overflow-y:auto;padding:0}
.pInner::-webkit-scrollbar{width:8px}.pInner::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:4px}
.pHead{position:sticky;top:0;background:linear-gradient(180deg,rgba(10,18,38,.98),rgba(8,14,28,.9));border-bottom:1px solid var(--line);padding:18px 22px 14px;z-index:2}
.pHead .ptype{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--bronze-bright)}
.pHead h2{font-family:"Cinzel",serif;font-weight:600;font-size:23px;margin:.18em 0 0;color:var(--silver);letter-spacing:.02em;line-height:1.15}
.pHead .pclose{position:absolute;top:14px;right:16px;cursor:pointer;color:var(--silver-dim);font-size:22px;line-height:1;background:none;border:none;transition:.2s}
.pHead .pclose:hover{color:var(--cyan)}
.pHead .owner{margin-top:6px;font-size:13px;color:var(--silver-dim);font-style:italic}

.pBody{padding:18px 22px 40px}
.sec{margin-bottom:20px}
.sec h3{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);border-bottom:1px solid var(--line);padding-bottom:5px;margin:0 0 9px}
.sec p{margin:0 0 9px;font-size:16px;line-height:1.6;color:var(--silver)}
.sec p.italic{font-style:italic;color:var(--silver-dim)}
.reward{border:1px solid rgba(201,160,90,.4);background:rgba(201,160,90,.08);border-radius:8px;padding:11px 14px;font-size:15px;line-height:1.5;color:var(--bronze-bright)}
.reward b{color:#fff}
.reward.locked{border-color:var(--line);background:rgba(8,14,28,.5);color:var(--silver-dim);font-style:italic;display:flex;align-items:flex-start;gap:9px}
.reward.locked .lk{color:var(--cyan-dim);font-style:normal}

/* control / progress controls */
.statebar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.sbtn{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-radius:6px;padding:9px 6px;cursor:pointer;border:1px solid var(--line);background:rgba(8,14,28,.6);color:var(--silver-dim);transition:.18s;text-align:center}
.sbtn:hover{color:var(--silver);border-color:var(--steel)}
.sbtn.on{color:#fff}
.sbtn[data-s="nagara"].on{border-color:var(--nagara);background:rgba(111,180,255,.18);color:var(--nagara)}
.sbtn[data-s="visite"].on{border-color:var(--silver-dim);background:rgba(159,176,200,.15);color:var(--silver)}
.sbtn[data-s="allie"].on{border-color:var(--ally);background:rgba(87,201,138,.18);color:var(--ally)}
.sbtn[data-s="ennemi"].on{border-color:var(--enemy);background:rgba(216,96,79,.18);color:var(--enemy)}
.sbtn[data-s="annexe"].on{border-color:var(--annex);background:rgba(201,160,90,.2);color:var(--bronze-bright)}

/* compteur de jet étendu d'intrigue */
.intrigue{border:1px solid rgba(95,212,255,.3);border-radius:8px;padding:11px 13px;background:rgba(95,212,255,.05)}
.intrigue.full{border-color:var(--ally);background:rgba(87,201,138,.08)}
.intrigue .ihead{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;color:var(--silver-dim);margin-bottom:9px}
.intrigue .ihead b{color:var(--cyan);font-size:15px}
.intrigue.full .ihead b{color:var(--ally)}
.intrigue .iadj{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--silver-dim)}
.intrigue .iadj button{width:23px;height:23px;border-radius:5px;border:1px solid var(--line);background:rgba(8,14,28,.7);color:var(--cyan);cursor:pointer;font-size:14px;line-height:1;transition:.15s}
.intrigue .iadj button:hover{border-color:var(--cyan);color:#fff}
.intrigue .isegs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.intrigue .iseg{flex:1 0 16px;height:16px;min-width:16px;border-radius:3px;border:1px solid var(--cyan-dim);background:rgba(8,14,28,.6);cursor:pointer;transition:.15s}
.intrigue .iseg:hover{border-color:var(--cyan)}
.intrigue .iseg.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px -2px var(--cyan)}
.intrigue.full .iseg.on{background:var(--ally);border-color:var(--ally);box-shadow:0 0 8px -2px var(--ally)}
.intrigue .ihint{font-size:12.5px;color:var(--silver-dim);font-style:italic;line-height:1.4}
.intrigue.full .ihint{color:var(--ally)}

/* NPC cards (player-light) */
.npc{border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:12px;background:rgba(10,18,38,.5)}
.npc .nname{font-family:"Cinzel",serif;font-size:14px;letter-spacing:.04em;color:var(--silver)}
.npc .nrole{font-size:12.5px;color:var(--bronze-bright);font-style:italic;margin-bottom:6px}
.npc .ndesc{font-size:14.5px;line-height:1.5;color:var(--silver-dim);font-style:italic;margin-bottom:0}

</style>
</head>
<body>
<div id="app">
  <aside id="house"><div class="hInner" id="houseInner"></div></aside>
  <div id="stage">
    <button id="houseToggle">⚑ Maison</button>
    <div id="mapFrame">
      <img id="mapImg" alt="" style="display:none">
      <div id="mapGrid"></div>
      <div id="scan"></div>
    </div>

    <div id="topbar">
      <div class="title">Atlas du monde · <b>Maison Nagara — Acte I</b></div>
      <div class="tools">
        <button class="tbtn" id="btnHouse">⚑ Replier la Maison</button>
        <button class="tbtn" id="btnLoad">⤓ Charger une carte</button>
        <button class="tbtn" id="btnExport">⬆ Exporter</button>
        <button class="tbtn" id="btnImport">⬇ Importer</button>
        <button class="tbtn" id="btnReset">↺ Réinitialiser</button>
      </div>
    </div>

    <div id="dropHint">
      <img id="dropCrest" alt="" style="height:148px;width:auto;margin-bottom:6px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.6))">
      <h2>Déployez la carte du monde Nagara</h2>
      <p>La carte du monde Nagara est embarquée — elle s’affiche d’elle-même, et toute carte chargée ici prendra le dessus. Les lieux connus apparaissent dessus ; d’autres se révéleront à mesure que la Maison reprend son monde.</p>

/* ============ DONNÉES JOUEURS : les 12 lieux ============ */

const LIEUX=[
{id:'donjon',x:29.14,y:47.31,hidden:false,defState:'nagara',
 name:"Le Donjon Nagara",type:'Siège de la Maison Nagara',owner:"Votre Maison, depuis toujours.",
 decor:"Moins un château qu'une enclume, bâti à même la roche-mère dans la première faille qu'aient creusée les Nagara. Murs épais, salles basses, un grand âtre où brûle un feu qu'on dit n'avoir jamais cessé. Aux poutres pendent les lames des aïeux — la dernière, celle du Comte mort sur Arrakis, tournée vers le bas. Personne n'ose encore y suspendre celle de l'héritière.",
 enjeu:"Le cœur de la Maison, et votre seul point d'appui sûr. Tant que la régence n'est pas pleinement reconnue, la Maison agit avec prudence et une autorité encore fragile (vos actions de Maison subissent +1 de difficulté). C'est ici que se tient le Conseil, que se décident les expéditions, et que l'héritière doit asseoir sa légitimité. Rien ne se reconquiert au-dehors tant que l'on ne tient pas fermement le dedans.",
 reward:"Déjà acquis : <b>refuge + centre de commandement</b>. Une fois la régence affermie, le malus disparaît et le Trait <b>« Le loup ne meurt pas »</b> se déploie pleinement.",
 npcs:[
  {name:"La Comtesse Nagara",role:"régente et douairière",
   desc:"Petite, droite, taillée dans le même calcaire que le Donjon. Elle ne hausse jamais la voix. Veuve, elle a choisi de s'effacer derrière sa fille — et reste le roc sur lequel s'appuie la régence."},
  {name:"Dame Hoshi",role:"doyenne des vassaux miniers",
   desc:"Veuve d'un capitaine mort aux côtés du Comte. Brusque, juste, increvable. Elle a donné un mari à la Maison et entend voir si l'héritière en est digne."}
 ]},

{id:'puits',x:63.62,y:33.92,hidden:false,defState:'ennemi',
 name:"Les Puits",type:'Tenu par la Maison Vael',owner:"Maison Vael, « pour assurer l'extraction ».",
 decor:"Onze niveaux de galeries qui plongent dans la chaleur et la poussière de silicate. Le cœur économique du monde, d'où sort la richesse Nagara. Vael s'y est glissée « pour assurer la continuité de l'extraction » — un service qui a tout d'une mainmise. Au onzième niveau, une galerie a été murée le mois dernier : un éboulement, dit-on. Trois mineurs y sont restés.",
 enjeu:"Reprendre les Puits, c'est rétablir les revenus de la Maison — et couper les vivres d'une rivale qui prospère sur votre bien. Les comptes de l'exploitation, murmure-t-on, ne tombent pas tout à fait juste. Et les mineurs, eux, n'ont pas oublié à qui va leur fidélité.",
 reward:"<b>Mobilité +1</b> · Atout <b>Registres des Puits</b> (de quoi peser au Landsraad ou dans une querelle d'honneur).",
 npcs:[
  {name:"Intendant Korr Vael",role:"gouverneur des Puits pour Vael",
   desc:"Cousin cadet de la rivale, placé là pour « gérer ». Onctueux, prudent, plus prompt à appeler des gardes qu'à croiser le fer."},
  {name:"Vieille Ouro",role:"cheffe d'équipe des mineurs",
   desc:"Quarante ans sous terre, l'autorité de qui a sauvé des vies. Elle n'aime pas Vael, mais craint pour ses gens plus que pour les blasons."}
 ]},

{id:'manufactures',x:44.93,y:67.62,hidden:false,defState:'ennemi',
 name:"Les Manufactures",type:'Tenu par la Maison Vael',owner:"Maison Vael.",
 decor:"Un horizon de cheminées rougeoyantes, des halls grands comme des cathédrales où le métal coule en rivières surveillées. C'est ici que la valeur brute devient valeur négociable — du poids au sein du CHOM. Vael y a placé ses maîtres-fondeurs, mais les ouvriers sont restés Nagara de cœur, et la chaîne tourne mal : on bâcle, on « oublie ».",
 enjeu:"Reprendre les Manufactures, c'est récupérer la capacité de peser dans toute négociation et de produire ce dont la Maison a besoin. Le levier, ici, n'est pas la force : c'est le sort des ouvriers. Qui gagne leur main gagne la chaîne.",
 reward:"<b>Rhétorique +1</b> · Atout <b>Chaînes de production</b> (équiper vite — armer une troupe, tenir un quota).",
 npcs:[
  {name:"Maître-fondeur Dren",role:"régisseur Vael des Manufactures",
   desc:"Un technicien plus qu'un seigneur, sans illusion sur ses maîtres, plus attaché à ses fours qu'aux blasons. On s'entend avec lui en respectant le métier."}
 ]},

{id:'spatioport',x:83.13,y:21.62,hidden:false,defState:'ennemi',
 name:"Le Spatioport",type:'Tenu par la Maison Vael',owner:"Maison Vael.",
 decor:"L'unique porte du monde vers l'Imperium : une dalle battue par les vents gris, une tour de contrôle ancienne, des hangars de navettes. C'est ici que tout a commencé — sur cette dalle, l'héritière gravissait la rampe d'une navette quand un fidèle a traversé le tarmac, mis genou en terre, et l'a saluée comme la chef de sa Maison.",
 enjeu:"Qui tient le Spatioport contrôle qui entre et qui sort du monde. Le reprendre, c'est cesser de dépendre du bon vouloir d'autrui pour ses propres mouvements — et savoir, enfin, qui va et vient sur ce monde, et avec quoi.",
 reward:"<b>Mobilité +1</b> · Atout <b>Contrôle des départs</b> (nul ne quitte le monde à l'insu des Nagara).",
 npcs:[
  {name:"Chef d'escale Obo Vael-Lige",role:"maître des départs, homme lige de Vael",
   desc:"Petit fonctionnaire gonflé d'une autorité d'emprunt. Il tamponne, il enregistre — et sait, contre bon prix, tout ce qui passe par sa tour."},
  {name:"Hadrek Vunt",role:"intermédiaire au service d'intérêts harkonnen",
   desc:"Onctueux, immense, toujours « de passage ». Il ne fait jamais rien lui-même : il observe, rapporte, et distille des « souhaits » qui sonnent comme des ordres. Sa présence n'est jamais innocente."}
 ]},

{id:'arsenal',x:64.95,y:59.28,hidden:false,defState:'ennemi',
 name:"L'Arsenal",type:'Tenu par la Maison Caradec',owner:"Maison Caradec, « pour qu'il ne tombe pas aux mains de Vael ».",
 decor:"Un bâtiment bas, sans fenêtres, gardé jour et nuit : sous ses dalles dort de quoi armer dix mille hommes. Râteliers de lames, fusils maula scellés, générateurs de bouclier en colonnes. Caradec l'a saisi « pour qu'il ne tombe pas aux mains de Vael ». C'est peut-être vrai. C'est aussi très commode.",
 enjeu:"Caradec n'est pas une rivale comme les autres : Maison martiale, attachée au code et à la lame, elle méprise Vael autant que vous. Reste à savoir si l'on peut lui reprendre l'Arsenal — ou la convaincre. L'une et l'autre voie demandent de se montrer digne à ses yeux.",
 reward:"<b>Combat +1</b> · Atout <b>Armer dix mille hommes</b> (équiper une troupe d'un coup).",
 npcs:[
  {name:"Dame Reiko Caradec",role:"cheffe de la Maison Caradec",
   desc:"Grande, sèche, le crâne rasé d'une vétérane. Elle a servi, elle a saigné, et gouverne sa Maison comme une garnison. Femme de doctrine et de parole."},
  {name:"Championne Nao",role:"bretteuse de Caradec",
   desc:"Jeune, brûlante, la meilleure lame de sa Maison. Elle rêve d'un adversaire à sa hauteur."}
 ]},

{id:'greniers',x:16.93,y:74.86,hidden:false,defState:'ennemi',
 name:"Les Greniers",type:'Tenu par la Maison Caradec',owner:"Maison Caradec.",
 decor:"D'énormes silos-bunkers capables de soutenir un siège, qui nourrissent les cités-forges et les puits. Qui tient les Greniers tient le ventre du monde — et la loyauté de ceux qui ont faim. Caradec les a pris en même temps que l'Arsenal, par la même logique de garde.",
 enjeu:"En période de chaos, le peuple suit qui le nourrit. Reprendre les Greniers, c'est restaurer la fidélité de la population et priver quiconque d'un moyen de pression sur vos quartiers fidèles. C'est aussi un test de la sincérité de Caradec.",
 reward:"<b>Discipline +1</b> · Trait <b>Imprenable</b> (une fois par acte, en cas de siège ou de blocus, ignorer une Condition d'investissement).",
 npcs:[
  {name:"Intendant Bako",role:"régisseur des Greniers pour Caradec",
   desc:"Un homme rond et précis, plus comptable que soldat. Honnête à sa manière : il déteste le gâchis et n'aime pas ce qu'on lui fait couvrir."}
 ]},

{id:'academie',x:71.05,y:60.81,hidden:false,defState:'ennemi',
 name:"L'Académie d'armes",type:'Tenu par la Maison Caradec',owner:"Maison Caradec.",
 decor:"Une salle d'armes ancienne aux planchers usés par des siècles de pas glissés, où l'on enseigne depuis toujours la lame Nagara. Le Comte y a appris à se battre ; ses enfants y ont fait leurs premières gardes. Humiliation suprême : Caradec y a installé ses maîtres. On enseigne la lame Nagara… sans les Nagara.",
 enjeu:"Le moins « stratégique » des fiefs, et le plus symbolique. Le reprendre restaure l'identité de la Maison — son rapport à la lame, à la lignée, à ceux qui la servent. C'est le lieu des duels d'honneur, et une vieille lame Nagara y dort dans une vitrine.",
 reward:"<b>Combat +1</b> · renforce le Trait <b>Lames héritées</b> (+1 dé aux duels des PJ Nagara tant que l'Académie est tenue) · la <b>Vieille Lame Nagara</b> (Atout transmissible).",
 npcs:[
  {name:"Maître d'armes Solen",role:"instructeur installé par Caradec",
   desc:"Un bretteur vieillissant qui enseigne la lame Nagara avec un respect sincère — et le malaise visible d'être là où il n'est pas chez lui."}
 ]},

{id:'labos',x:86.78,y:49.51,hidden:false,defState:'ennemi',
 name:"Les Laboratoires",type:'Administré par la Maison Drosse',owner:"Maison Drosse (marchande).",
 decor:"Salles blanches et tièdes, contrastant avec la rudesse du monde : on y analyse les minerais, on affine les alliages, on perce la chimie des choses. Drosse — marchande d'information et de science, sans loyauté autre que le profit — les « administre » et en vend la production au plus offrant, Nagara compris, à prix d'or.",
 enjeu:"Drosse n'est ni alliée ni ennemie : une marchande. Tout y a un prix, y compris la vérité. Ce que recèlent ces laboratoires — analyses, expertises, secrets matériels — peut s'acheter, se contraindre… ou se prendre. À chaque voie son coût.",
 reward:"<b>Analyse +1</b> · Atout <b>Savoir-faire de pointe</b> (expertises et un avantage technique ponctuel : percer un secret matériel que nul autre ne lit).",
 npcs:[
  {name:"Maîtresse-chimiste Veln Drosse",role:"régente scientifique des Laboratoires",
   desc:"Insatiablement curieuse, glaciale, le regard d'une femme qui voit dans les gens des échantillons. Elle respecte qui parle la langue des faits."}
 ]},

{id:'reseau',x:40.28,y:31.83,hidden:false,defState:'ennemi',
 name:"Le Réseau",type:'Administré par la Maison Drosse',owner:"Maison Drosse.",
 decor:"Pas un lieu unique : une toile. Un comptoir anodin en façade, et derrière, une infrastructure de mouchards, de scanners discrets, de clients compromis et d'employés déguisés en passants. Le vrai trésor de Drosse : des secrets sur toutes les Maisons du monde, doublés hors-monde « au cas où ».",

/* ============ STATE / PERSISTENCE ============ */
const KEY='atlas_nagara_joueurs_v1';
let ST=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(ST))}catch(e){}}
function stateOf(id){const l=LIEUX.find(x=>x.id===id);return (ST.states&&ST.states[id])||l.defState;}
function setState(id,s){ST.states=ST.states||{};ST.states[id]=s;save();}
function revealedOf(id){return !!(ST.revealed&&ST.revealed[id]);}
function setRevealed(id,v){ST.revealed=ST.revealed||{};ST.revealed[id]=v;save();}
/* un lieu est "contrôlé" (récompense débloquée) s'il est fief, allié ou annexé */
function isControlled(s){return s==='nagara'||s==='allie'||s==='annexe';}

/* ---- état de la Maison ---- */
function H(){ST.house=ST.house||{};return ST.house;}
function statutId(){return H().statut||'naissante';}
function statutObj(){return STATUTS.find(s=>s.id===statutId())||STATUTS[0];}
function setStatut(id){H().statut=id;save();renderHouse();}
function melange(){const h=H();return h.melange!=null?h.melange:0;}
function setMelange(v){H().melange=Math.max(0,v);save();renderHouse();}
function menace(){const h=H();return h.menace!=null?h.menace:0;}
function setMenace(v){H().menace=Math.max(0,v);save();renderHouse();}
/* dépenser 1 jeton de réserve => +1 Menace (flux 1:1) */
function spendMelange(){if(melange()<=0)return;H().melange=melange()-1;H().menace=menace()+1;save();renderHouse();}
function gainMelange(n){H().melange=melange()+n;save();renderHouse();}
function domVal(id){const h=H();const d=DOMAINES.find(x=>x.id===id);return (h.domaines&&h.domaines[id]!=null)?h.domaines[id]:d.base;}
function setDom(id,v){H().domaines=H().domaines||{};const cur=domVal(id);H().domaines[id]=(cur===v?v-1:v);H().domaines[id]=Math.max(0,H().domaines[id]);save();renderHouse();}
function traitActive(id){return !!(H().traits&&H().traits[id]);}
function toggleTrait(id){const t=TRAITS.find(x=>x.id===id);if(t.lock&&!statutUnlocked(t.lock))return;H().traits=H().traits||{};H().traits[id]=!traitActive(id);save();renderHouse();}
function statutUnlocked(req){const order={naissante:0,mineure:1,majeure:2};return order[statutId()]>=order[req];}
function spec(){return H().spec||null;}
function setSpec(id){H().spec=(spec()===id?null:id);save();renderHouse();}

/* seuils de jet étendu d'intrigue par lieu (succès cumulés à atteindre en Phase Maison) */
const SEUILS={residence:5,port:6,vieilleville:5,concession:7,banquet:5,carthag:6,sietch:6,desert:5,bassin:5,repudiee:3,depot:6};
function seuilDefaut(id){return SEUILS[id]||4;}

/* positions des lieux (figées dans les données) */
function posOf(id){const l=LIEUX.find(x=>x.id===id);const p=ST.positions&&ST.positions[id];return p?{x:p.x,y:p.y}:{x:l.x,y:l.y};}

/* compteur de jet étendu d'intrigue */
function intrigueOf(id){const d=ST.intrigue&&ST.intrigue[id];return {prog:(d&&d.prog)||0,seuil:(d&&d.seuil)||seuilDefaut(id)};}
function setIntrigue(id,prog,seuil){ST.intrigue=ST.intrigue||{};const c=intrigueOf(id);ST.intrigue[id]={prog:prog!=null?prog:c.prog,seuil:seuil!=null?seuil:c.seuil};save();}
function bumpIntrigue(id,n){const c=intrigueOf(id);setIntrigue(id,c.prog===n?n-1:n,c.seuil);refreshIntrigue(id);}
function adjSeuil(id,d){const c=intrigueOf(id);const s=Math.max(2,Math.min(12,c.seuil+d));setIntrigue(id,Math.min(c.prog,s),s);refreshIntrigue(id);}
window.bumpIntrigue=bumpIntrigue;window.adjSeuil=adjSeuil;

/* ============ RENDER MARKERS ============ */
const stage=document.getElementById('stage');
const mapFrame=document.getElementById('mapFrame');
let mapNat=null;
/* Cale le cadre carte sur le rectangle réellement affiché de l'image (object-fit
   contain recalculé en JS) ; les marqueurs, enfants du cadre, suivent donc la
   carte : ils restent sur leur point et se mettent à l'échelle avec elle. */
function layoutMapFrame(){
  if(!mapNat)return;
  const W=stage.clientWidth,H=stage.clientHeight;
  if(!W||!H)return;
  const ar=mapNat.w/mapNat.h;
  let dispW,dispH;
  if(W/H>ar){dispH=H;dispW=H*ar;}else{dispW=W;dispH=W/ar;}
  const k=dispW/mapNat.w;
  mapFrame.style.width=mapNat.w+'px';
  mapFrame.style.height=mapNat.h+'px';
  mapFrame.style.left=((W-dispW)/2)+'px';
  mapFrame.style.top=((H-dispH)/2)+'px';
  mapFrame.style.transform='scale('+k+')';
}
if(window.ResizeObserver){new ResizeObserver(()=>layoutMapFrame()).observe(stage);}
window.addEventListener('resize',layoutMapFrame);
function renderMarkers(){
  document.querySelectorAll('.marker').forEach(m=>m.remove());
  LIEUX.forEach(l=>{
    const m=document.createElement('div');m.className='marker';m.dataset.id=l.id;
    if(l.hidden){m.classList.add('hiddenLoc');if(revealedOf(l.id))m.classList.add('revealed');}
    m.dataset.state=stateOf(l.id);
    const p=posOf(l.id);m.style.left=p.x+'%';m.style.top=p.y+'%';
    m.innerHTML=`<span class="ping"></span><span class="glyph"></span><span class="lbl">${l.name}</span>`;
    attachMarker(m,l);
    mapFrame.appendChild(m);
  });
}
/* clic = ouvrir la fiche du lieu */
function attachMarker(m,l){
  m.onclick=()=>openPanel(l.id);
}

/* ============ PANEL ============ */
const panel=document.getElementById('panel'), pInner=document.getElementById('pInner');
let curId=null;
const STATES=[['nagara','Fief Nagara'],['visite','Découvert'],['allie','Allié'],['ennemi','Rivale'],['annexe','Annexé']];

function rewardHTML(l,cur){
  if(isControlled(cur)){
    return `<div class="reward">${l.reward||''}</div>`;
  }
  return `<div class="reward locked"><span class="lk">▣</span><span>Récompense scellée. Elle se révélera lorsque ce lieu passera sous votre contrôle (allié, fief ou annexé).</span></div>`;
}

function intrigueHTML(id){
  const {prog,seuil}=intrigueOf(id);
  const full=prog>=seuil;
  const segs=Array.from({length:seuil},(_,i)=>`<div class="iseg ${i<prog?'on':''}" onclick="bumpIntrigue('${id}',${i+1})"></div>`).join('');
  return `<div class="intrigue ${full?'full':''}">
    <div class="ihead"><span>Succès accumulés <b>${prog}/${seuil}</b></span>
      <span class="iadj"><button onclick="adjSeuil('${id}',-1)" title="Seuil −">–</button><span>seuil</span><button onclick="adjSeuil('${id}',1)" title="Seuil +">+</button></span></div>
    <div class="isegs">${segs}</div>
    <div class="ihint">${full?'✓ Jet étendu accompli — le contrôle du lieu est à portée. Réglez ensuite son état ci-dessus.':'En Phase Maison, reportez ici les succès obtenus en cliquant le palier atteint. Ce lieu peut alimenter un scénario et/ou un jet étendu.'}</div>
  </div>`;
}
function refreshIntrigue(id){const box=document.getElementById('intrigueBox');if(box&&curId===id)box.innerHTML=intrigueHTML(id);}

function openPanel(id){
  curId=id;const l=LIEUX.find(x=>x.id===id);
  document.querySelectorAll('.marker').forEach(m=>m.classList.toggle('sel',m.dataset.id===id));
  const cur=stateOf(id);
  pInner.innerHTML=`
    <div class="pHead">
      <button class="pclose" onclick="closePanel()">✕</button>
      <div class="ptype">${l.type}</div>
      <h2>${l.name}</h2>
      <div class="owner">${l.owner||''}</div>
    </div>
    <div class="pBody">
      <div class="sec"><h3>État du lieu <span style="color:var(--silver-dim);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">· progression</span></h3>
        <div class="statebar">${STATES.map(s=>`<button class="sbtn ${cur===s[0]?'on':''}" data-s="${s[0]}" onclick="pick('${id}','${s[0]}')">${s[1]}</button>`).join('')}</div>
      </div>
      <div class="sec"><h3>Jet étendu d'intrigue <span style="color:var(--silver-dim);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">· Phase Maison</span></h3>
        <div id="intrigueBox">${intrigueHTML(id)}</div>
      </div>
      <div class="sec"><h3>Décor</h3><p class="italic">${l.decor||''}</p></div>
      <div class="sec"><h3>L'enjeu</h3><p>${l.enjeu||''}</p></div>
      <div class="sec"><h3>Récompense de contrôle</h3><div id="rewardBox">${rewardHTML(l,cur)}</div></div>
      ${(l.npcs&&l.npcs.length)?`<div class="sec"><h3>Personnages connus</h3>${l.npcs.map(npcCard).join('')}</div>`:''}
    </div>`;
  panel.classList.add('open');
}
function npcCard(n){
  return `<div class="npc">
    <div class="nname">${n.name}</div>
    <div class="nrole">${n.role}</div>
    <div class="ndesc">${n.desc}</div>
  </div>`;
}
function closePanel(){panel.classList.remove('open');curId=null;document.querySelectorAll('.marker').forEach(m=>m.classList.remove('sel'));}
function pick(id,s){
  setState(id,s);
  const l=LIEUX.find(x=>x.id===id);
  const mk=document.querySelector(`.marker[data-id="${id}"]`);
  if(mk) mk.dataset.state=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  const rb=document.getElementById('rewardBox');
  if(rb) rb.innerHTML=rewardHTML(l,s);
  checkReveals();
}
window.closePanel=closePanel;window.pick=pick;

/* ============ RÉVÉLATION AUTOMATIQUE (lieux à l'écart des cartes) ============ */

const REVEALS={
  scories:{any:['spatioport','reseau','puits']},
  cendres:{any:['reseau']},
  cache:{all:['puits','spatioport','scories']}
};
function ctrl(id){return isControlled(stateOf(id));}
function revealCond(id){
  const r=REVEALS[id]; if(!r)return false;
  if(r.any) return r.any.some(ctrl);
  if(r.all) return r.all.every(ctrl);
  return false;
}
function checkReveals(){
  let changed=false;
  LIEUX.filter(l=>l.hidden && !revealedOf(l.id)).forEach(l=>{
    if(revealCond(l.id)){setRevealed(l.id,true);changed=true;}
  });
  if(changed)renderMarkers();
  return changed;
}

['btnLoad','btnLoad2'].forEach(id=>document.getElementById(id).onclick=()=>fileInput.click());
fileInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{ST.mapData=r.result;save();}catch(err){alert("Image trop lourde pour la mémoire locale ; elle s'affichera mais ne sera pas mémorisée.");}applyMap(r.result);};
  r.readAsDataURL(f);};
/* export / import a full save (.json) */
document.getElementById('btnExport').onclick=()=>{
  const data=JSON.stringify(ST,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`sauvegarde_atlas_arrakeen_joueurs_${d}.json`;a.click();
  URL.revokeObjectURL(url);
};
const saveInput=document.getElementById('saveInput');
document.getElementById('btnImport').onclick=()=>saveInput.click();
saveInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{
    const obj=JSON.parse(r.result);
    if(typeof obj!=='object'||obj===null)throw new Error("format");
    ST=obj;save();
    renderMarkers();
    renderHouse();
    setHouseOpen(H().panelOpen!==false);
    if(ST.mapData)applyMap(ST.mapData);
    closePanel();
    alert("Sauvegarde importée.");
  }catch(err){alert("Fichier de sauvegarde illisible : "+err.message);}
  saveInput.value='';};
  r.readAsText(f);};

document.getElementById('btnReset').onclick=()=>{
  if(!confirm("Réinitialiser les états des lieux, les révélations et les compteurs de jet étendu ? (la carte de fond et les positions sont conservées)"))return;
  ST.states={};ST.revealed={};ST.intrigue={};save();renderMarkers();closePanel();
};

/* drag & drop onto the stage */
stage.addEventListener('dragover',e=>{e.preventDefault();});
stage.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const r=new FileReader();r.onload=()=>{ST.mapData=r.result;save();applyMap(r.result);};r.readAsDataURL(f);}});

/* ============ SIDEBAR MAISON ============ */
const houseEl=document.getElementById('house'), houseInner=document.getElementById('houseInner');
const houseToggle=document.getElementById('houseToggle'), btnHouse=document.getElementById('btnHouse');
function openSecs(){H().openSecs=H().openSecs||{statut:true,melange:true,domaines:false,traits:false,spec:false,maisonnee:false};return H().openSecs;}
function toggleSec(id){const o=openSecs();o[id]=!o[id];save();renderHouse();}
window.toggleSec=toggleSec;

function sec(id,title,bodyHTML){
  const open=openSecs()[id];
  return `<div class="hSec ${open?'open':''}">
    <div class="hHd" onclick="toggleSec('${id}')"><span class="ht">${title}</span><span class="hcar">▶</span></div>
    <div class="hBd"><div class="hBdIn">${bodyHTML}</div></div>
  </div>`;
}
function fondateur(){const h=H();return h.fondateur||null;}
function escF(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fondateurHTML(){
  const f=fondateur();
  if(!f) return `<div class="chip trait fondateur vide" onclick="editFondateur()">
      <span class="ct">\u25c7 libre</span>
      <div class="cn">Trait fondateur</div>
      <div class="cd">Le Trait n\u00e9 de la vocation de la Maison, port\u00e9 par la Forge \u2014 ou tout Trait accord\u00e9 en cours de partie. Cliquez pour le nommer.</div></div>`;
  const on=!!(ST.traitsOn&&ST.traitsOn.fondateur);
  return `<div class="chip trait fondateur" onclick="toggleFondateur()">
      <span class="ct">${on?'\u2726 invoqu\u00e9':'fondateur'}</span>
      <div class="cn">${escF(f.nom)}<span class="fedit" onclick="event.stopPropagation();editFondateur()" title="Modifier">\u270e</span></div>
      <div class="cd">${f.desc?escF(f.desc):'\u2014'}</div></div>`;
}
function editFondateur(){
  const f=fondateur()||{nom:'',desc:''};
  const nom=prompt("Nom du Trait fondateur (laisser vide pour le retirer) :",f.nom||'');
  if(nom===null)return;
  if(!nom.trim()){delete H().fondateur;if(ST.traitsOn)delete ST.traitsOn.fondateur;save();renderHouse();return;}
  const desc=prompt("Effet ou description (facultatif) :",f.desc||'');
  H().fondateur={nom:nom.trim(),desc:(desc===null?'':desc.trim())};
  save();renderHouse();
}
function toggleFondateur(){
  if(!fondateur())return editFondateur();
  ST.traitsOn=ST.traitsOn||{};ST.traitsOn.fondateur=!ST.traitsOn.fondateur;save();renderHouse();
}
function renderHouse(){
  const st=statutObj();
  /* statut */
  const statutHTML=`
    <div class="statusRow">${STATUTS.map(s=>`<button class="statusBtn ${statutId()===s.id?'on':''}" onclick="setStatut('${s.id}')">${s.nom}<b>${s.quota}</b><span style="font-size:8.5px;letter-spacing:.04em">${s.acte}</span></button>`).join('')}</div>
    <div class="quota">Amorce au pool commun : <b>${st.quota}</b> jeton${st.quota>1?'s':''} par agent</div>`;
  /* mélange */
  const m=melange();
  const ghosts=Math.max(0,Math.min(8,(st.quota*5)-m)); /* repères visuels jusqu'au plein "théorique" */
  const toks=Array.from({length:m},()=>`<div class="melTok" onclick="spendMelange()" title="Dépenser 1 jeton (→ Menace)"></div>`).join('')
    + Array.from({length:ghosts},()=>`<div class="melTok ghost" onclick="gainMelange(1)" title="Ajouter 1 jeton à la réserve"></div>`).join('');
  const melHTML=`
    <div class="melHead"><span class="melN">${m}</span><span class="melL">jetons en réserve</span></div>
    <div class="melTokens">${toks||'<span style="font-size:12px;color:var(--silver-dim);font-style:italic">Réserve vide</span>'}</div>
    <div class="melBtns">
      <button onclick="gainMelange(1)" title="Réussite majeure d'intrigue / récolte fructueuse">+1 intrigue</button>
      <button onclick="gainMelange(2)" title="Réussite magistrale / récolte exceptionnelle">+2 magistrale</button>
      <button class="spend" onclick="spendMelange()" title="Dépenser 1 jeton → +1 Menace">– dépenser</button>
    </div>
    <div class="melNote">Pool commun de la Maison : il croît par la conquête — +1 par lieu repris, et certains lieux comptent double. Aucune régénération. Tout jeton dépensé file vers la Menace du MJ (1:1).</div>
    <div class="menaceRow"><span class="ml">Menace du MJ</span><span class="mctl"><button onclick="setMenace(menace()-1)">–</button></span><span class="mv">${menace()}</span><span class="mctl"><button onclick="setMenace(menace()+1)">+</button></span></div>`;
  /* domaines */
  const domHTML=DOMAINES.map(d=>{
    const v=domVal(d.id);
    const pips=[1,2,3,4,5,6].map(n=>`<div class="domPip ${v>=n?'on':''}" onclick="setDom('${d.id}',${n})"></div>`).join('');
    return `<div class="domRow"><div class="dn">${d.nom}<span>${d.sub}</span></div><div class="domPips">${pips}</div></div>`;
  }).join('')+`<div class="melNote" style="margin-top:4px">Domaines de Maison (0-6) : ils servent de Compétences dans les jets étendus de la Phase Intrigue — seuil = Domaine + Principe. Ils montent par la conquête : un Tableau sécurisé peut porter un Domaine en récompense.</div>`;
  /* traits */
  const traitsHTML=TRAITS.map(t=>{
    const locked=t.lock&&!statutUnlocked(t.lock);
    const on=traitActive(t.id);
    return `<div class="chip trait ${locked?'locked':''}" onclick="${locked?'':`toggleTrait('${t.id}')`}">
      <span class="ct">${on?'✦ invoqué':'Acte '+t.acte}</span>
      <div class="cn">${t.nom}</div><div class="cd">${t.desc}</div></div>`;
  }).join('')+fondateurHTML()+`<div class="melNote" style="margin-top:4px">Invocables pour 1 jeton de Mélange (effet de scène). Cliquez pour marquer un Trait comme invoqué.</div>`;
  /* spécialisation de Maison (extension Les Agents de Dune — choix unique) */
  const curSpec=spec();
  const specHTML=SPECS.map(s=>`<div class="spec ${curSpec===s.id?'sel':''}" onclick="setSpec('${s.id}')">
      <div class="arow"><span class="an">${curSpec===s.id?'◆ ':''}${s.nom}</span><span class="seq">${s.equip}</span></div>
      <div class="ad">${s.desc}</div>
    </div>`).join('');
  const specBan=curSpec?`<div class="selBanner">Spécialisation : <b>${SPECS.find(s=>s.id===curSpec).nom}</b> — équipement-signature : ${SPECS.find(s=>s.id===curSpec).equip}.</div>`:`<div class="melNote">Choisissez la spécialisation de la Maison — une seule (extension « Les Agents de Dune »).</div>`;
  /* maisonnée */
  const agentsHTML=AGENTS.map(a=>`<div class="agent"><div class="arole">${a.role}</div><div class="aname">${a.nom}</div><div class="askills">${a.skills}</div><div class="aatout">⬩ ${a.atout}</div></div>`).join('')
    +`<div class="melNote" style="margin:6px 0 7px">Fidèles de la Maisonnée</div>`
    +MAISONNEE.map(p=>`<div class="agent pnj"><div class="arole">${p.role}</div><div class="aname">${p.nom}</div><div class="askills" style="font-style:italic">${p.desc}</div></div>`).join('');

  houseInner.innerHTML=`
    <div class="hCrest">
      <div class="crestRow">
        <img class="banner" src="${CREST_BANNER}" alt="">
        <div class="wolfWrap"><img src="${CREST_WOLF}" alt="Tête de loup Nagara"></div>
        <img class="banner flip" src="${CREST_BANNER}" alt="">
      </div>
      <div class="hname">Maison Nagara</div>

/* repli de la sidebar */
function setHouseOpen(on){
  houseEl.classList.toggle('collapsed',!on);
  houseToggle.classList.toggle('show',!on);

}
